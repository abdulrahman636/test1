<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسل رسائل الواتساب المطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;700&display=swap');
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-green-600 to-emerald-700 p-8 text-white relative">
            <h1 class="text-3xl font-bold mb-2 text-shadow-sm">نظام الإرسال الذكي</h1>
            <p class="opacity-90 font-light text-lg">قم بلصق البيانات وأرسل دعواتك باحترافية وسهولة</p>
            
            <!-- Platform Selection Toggle -->
            <div class="mt-6 inline-flex bg-white/20 p-1 rounded-xl backdrop-blur-md border border-white/30">
                <button onclick="setPlatform('web')" id="btnWeb" class="px-6 py-2 rounded-lg font-bold transition-all text-sm bg-white text-emerald-800 shadow-lg">
                    الواتساب ويب (كمبيوتر)
                </button>
                <button onclick="setPlatform('mobile')" id="btnMobile" class="px-6 py-2 rounded-lg font-bold transition-all text-sm hover:bg-white/10">
                    تطبيق الواتساب (جوال)
                </button>
            </div>
        </div>

        <div class="p-8 space-y-8">
            <section class="bg-gray-50 p-6 rounded-2xl border border-gray-200">
                <label class="flex items-center gap-2 text-gray-800 font-bold mb-3 text-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    تعديل نص الرسالة:
                </label>
                <textarea id="messageTemplate" rows="6" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-4 focus:ring-green-100 focus:border-green-500 outline-none text-gray-700 leading-relaxed transition-all">
ضع نص الرسالة هنا.</textarea>
                <p class="text-sm text-gray-500 mt-2 italic">* ملاحظة: سيتم استبدال {الاسم} تلقائياً بالأسماء التي ستدخلها بالأسفل.</p>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="block text-gray-700 font-bold flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-600 w-6 h-6 flex items-center justify-center rounded-full text-xs font-mono">1</span>
                        قائمة الأسماء (كل اسم في سطر):
                    </label>
                    <textarea id="namesInput" rows="8" placeholder="د. محمد&#10;د. أحمد" class="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none bg-blue-50/30 custom-scrollbar"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="block text-gray-700 font-bold flex items-center gap-2">
                        <span class="bg-green-100 text-green-600 w-6 h-6 flex items-center justify-center rounded-full text-xs font-mono">2</span>
                        أرقام الهواتف (كل رقم في سطر):
                    </label>
                    <textarea id="phonesInput" rows="8" placeholder="966500000000" class="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-400 outline-none bg-green-50/30 custom-scrollbar"></textarea>
                </div>
            </div>

            <div id="validationMessage" class="hidden p-4 rounded-xl bg-red-50 text-red-700 text-sm border border-red-100 animate-fade-in"></div>

            <button onclick="processData()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1 flex items-center justify-center gap-2">
                توليد قائمة الإرسال الشخصية
            </button>

            <section id="resultSection" class="hidden animate-fade-in">
                <div class="flex items-center justify-between border-b pb-4 mb-6">
                    <h3 class="font-bold text-gray-800 text-xl italic underline decoration-green-500 underline-offset-8">جاهز للإرسال الآن:</h3>
                    <span id="counter" class="bg-green-100 text-green-700 px-4 py-1 rounded-full font-bold text-sm"></span>
                </div>
                <div id="contactsList" class="grid grid-cols-1 gap-4">
                    <!-- Cards will appear here -->
                </div>
            </section>
        </div>

        <div class="bg-gray-50 p-6 text-center border-t">
            <p class="text-gray-500 text-sm mb-1 italic">نظام مخصص لإرسال رسائل عبر الواتساب</p>
            <div class="flex flex-col items-center gap-1">
                <span class="text-slate-800 font-bold text-base">تم إعداده من قبل عبدالرحمن الغامدي</span>
                <span class="bg-slate-200 text-slate-600 px-3 py-0.5 rounded-full text-[10px] uppercase tracking-widest font-bold">مايو 2026</span>
            </div>
        </div>
    </div>

    <script>
        let currentPlatform = 'web';

        function setPlatform(platform) {
            currentPlatform = platform;
            const btnWeb = document.getElementById('btnWeb');
            const btnMobile = document.getElementById('btnMobile');

            if (platform === 'web') {
                btnWeb.className = 'px-6 py-2 rounded-lg font-bold transition-all text-sm bg-white text-emerald-800 shadow-lg';
                btnMobile.className = 'px-6 py-2 rounded-lg font-bold transition-all text-sm hover:bg-white/10 text-white';
            } else {
                btnMobile.className = 'px-6 py-2 rounded-lg font-bold transition-all text-sm bg-white text-emerald-800 shadow-lg';
                btnWeb.className = 'px-6 py-2 rounded-lg font-bold transition-all text-sm hover:bg-white/10 text-white';
            }
            
            // Re-process if list already exists to update links
            if (!document.getElementById('resultSection').classList.contains('hidden')) {
                processData();
            }
        }

        function processData() {
            const template = document.getElementById('messageTemplate').value;
            const namesRaw = document.getElementById('namesInput').value.trim();
            const phonesRaw = document.getElementById('phonesInput').value.trim();
            const validationDiv = document.getElementById('validationMessage');
            const listContainer = document.getElementById('contactsList');
            const section = document.getElementById('resultSection');
            const counterSpan = document.getElementById('counter');

            validationDiv.classList.add('hidden');
            listContainer.innerHTML = '';
            
            if (!namesRaw || !phonesRaw) {
                showError("يرجى التأكد من ملء كل من خانة الأسماء وخانة الأرقام.");
                return;
            }

            const names = namesRaw.split('\n').map(n => n.trim()).filter(n => n !== "");
            const phones = phonesRaw.split('\n').map(p => p.trim().replace(/\s+/g, '')).filter(p => p !== "");

            if (names.length !== phones.length) {
                showError(`تنبيه: عدد الأسماء (${names.length}) لا يتطابق مع عدد الأرقام (${phones.length}).`);
                return;
            }

            names.forEach((name, index) => {
                const phone = phones[index];
                const finalMessage = template.replace(/{الاسم}/g, name);
                const encodedMessage = encodeURIComponent(finalMessage);
                
                // Construct URL based on platform
                const waUrl = currentPlatform === 'web' 
                    ? `https://web.whatsapp.com/send?phone=${phone}&text=${encodedMessage}`
                    : `https://wa.me/${phone}?text=${encodedMessage}`;

                const contactCard = document.createElement('div');
                contactCard.className = "animate-fade-in group flex flex-col md:flex-row items-center justify-between bg-white p-5 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:border-green-200 transition-all";
                contactCard.style.animationDelay = `${index * 50}ms`;
                
                contactCard.innerHTML = `
                    <div class="flex items-center gap-4 mb-4 md:mb-0 w-full md:w-auto">
                        <div class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center font-bold text-sm border border-green-100">
                            ${index + 1}
                        </div>
                        <div>
                            <span class="block font-bold text-gray-800 text-lg">${name}</span>
                            <span class="text-xs text-gray-400 font-mono">${phone}</span>
                        </div>
                    </div>
                    <div class="flex gap-3 w-full md:w-auto">
                        <button onclick="previewMessage('${index}')" class="flex-1 md:flex-none px-5 py-2.5 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition text-sm font-medium">معاينة</button>
                        <a href="${waUrl}" target="_blank" onclick="markAsSent(this)" class="flex-1 md:flex-none px-8 py-2.5 bg-green-500 text-white rounded-xl hover:bg-green-600 transition font-bold text-center text-sm shadow-sm flex items-center justify-center gap-2">
                            إرسال ${currentPlatform === 'web' ? 'ويب' : 'تطبيق'}
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                            </svg>
                        </a>
                    </div>
                    <!-- Preview Modal -->
                    <div id="preview-${index}" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
                        <div class="bg-white p-8 rounded-3xl max-w-xl w-full shadow-2xl">
                            <h4 class="font-bold text-xl text-slate-800 mb-6">معاينة الرسالة:</h4>
                            <div class="bg-emerald-50 text-emerald-900 p-6 rounded-2xl whitespace-pre-wrap text-sm border border-emerald-100 mb-6 leading-relaxed max-h-[60vh] overflow-y-auto custom-scrollbar italic">
${finalMessage}
                            </div>
                            <button onclick="closePreview('${index}')" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition shadow-lg">إغلاق</button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(contactCard);
            });

            counterSpan.innerText = `الإجمالي: ${names.length} شخص`;
            section.classList.remove('hidden');
        }

        function showError(msg) {
            const div = document.getElementById('validationMessage');
            div.innerText = msg;
            div.classList.remove('hidden');
        }

        function previewMessage(id) {
            document.getElementById(`preview-${id}`).classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePreview(id) {
            document.getElementById(`preview-${id}`).classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function markAsSent(el) {
            el.classList.remove('bg-green-500', 'hover:bg-green-600');
            el.classList.add('bg-blue-900');
            el.innerHTML = 'تم الفتح ✓';
        }
    </script>
</body>
</html>
